<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pinpoint — Sign in</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        width: 280px;
        margin: 0;
        padding: 1rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 0.75rem;
      }
      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 600;
        margin-top: 0.5rem;
        margin-bottom: 0.25rem;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        font-size: 0.875rem;
        padding: 0.375rem 0.5rem;
        box-sizing: border-box;
        border: 1px solid #c8c8c8;
        border-radius: 4px;
      }
      input:focus {
        outline: 2px solid #2563eb;
        outline-offset: 1px;
      }
      button[type="submit"] {
        margin-top: 0.875rem;
        width: 100%;
        padding: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #ffffff;
        background-color: #2563eb;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button[type="submit"]:disabled {
        background-color: #93b3f1;
        cursor: not-allowed;
      }
      .error {
        margin-top: 0.5rem;
        padding: 0.5rem;
        background-color: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 4px;
        color: #b91c1c;
        font-size: 0.8125rem;
        line-height: 1.3;
      }
      .error[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Sign in to Pinpoint</h1>
    <form id="popup-login-form" novalidate>
      <label for="popup-email">Email</label>
      <input id="popup-email" name="email" type="email" autocomplete="username" required />

      <label for="popup-password">Password</label>
      <input
        id="popup-password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
      />

      <button id="popup-submit" type="submit">Sign in</button>
      <div id="popup-error" class="error" role="alert" aria-live="polite" hidden></div>
    </form>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
